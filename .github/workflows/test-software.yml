name: Test Software

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  run-example:
    runs-on: ubuntu-latest
    name: "${{ matrix.name }}"

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "4ake_A / 2eck_B"
            command_file: 4akeA_2eckB_command.txt
            output_dir: 4ake_A_2eck_B

          - name: "1cts_A / 2cts_A"
            command_file: 1ctsA_2ctsA_command.txt
            output_dir: 1CTS_A_2CTS_A

          - name: "1omp_A / 1anf_A"
            command_file: 1ompA_1anfA_command.txt
            output_dir: 1OMP_A_1ANF_A

          - name: "1adg_A / 2ohx_A"
            command_file: 1adgA_2ohxA_command.txt
            output_dir: 1ADG_A_2OHX_A

          - name: "1cdl_A / 1cll_A"
            command_file: 1cdllA_1cllA_command.txt
            output_dir: 1CDL_A_1CLL_A

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r src/DynDom1D_Python/requirements.txt

      - name: Save reference outputs
        run: cp -r src/DynDom1D_Python/output/${{ matrix.output_dir }} reference_output

      - name: Install command file for this test case
        working-directory: src/DynDom1D_Python
        run: cp data/${{ matrix.command_file }} data/command.txt

      - name: Run the example
        working-directory: src/DynDom1D_Python
        run: python main.py

      - name: Compare outputs to reference
        run: |
          diff -r \
            --exclude="clustering_logs" \
            src/DynDom1D_Python/output/${{ matrix.output_dir }} \
            reference_output